<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/site.css">
    <title>Bolt Map — Chronos</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        /* dark overlay over background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.82);
            z-index: 0;
            pointer-events: none;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        #map-container {
            position: fixed;
            inset: 0;
            top: 52px; /* below nav */
            z-index: 1;
            cursor: grab;
            overflow: hidden;
        }

        #map-container:active {
            cursor: grabbing;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        #tooltip {
            position: fixed;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 0.5rem 0.75rem;
            font-family: Menlo, Monaco, monospace;
            font-size: 0.75rem;
            pointer-events: none;
            display: none;
            z-index: 200;
            max-width: 260px;
            line-height: 1.5;
        }

        #hud {
            position: fixed;
            bottom: 1.5rem;
            left: 1.5rem;
            z-index: 200;
            color: rgba(255,255,255,0.6);
            font-family: Menlo, Monaco, monospace;
            font-size: 0.75rem;
            line-height: 1.6;
            pointer-events: none;
        }

        #legend {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 200;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 0.75rem 1rem;
            color: rgba(255,255,255,0.75);
            font-family: Menlo, Monaco, monospace;
            font-size: 0.72rem;
            line-height: 1.8;
        }

        .legend-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .legend-line {
            width: 24px;
            height: 2px;
            background: white;
            display: inline-block;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: white;
            display: inline-block;
        }

        .legend-square {
            width: 10px;
            height: 10px;
            background: white;
            display: inline-block;
        }

        .legend-diag {
            width: 24px;
            height: 2px;
            background: rgba(255,255,255,0.5);
            display: inline-block;
        }

        .legend-vert {
            width: 2px;
            height: 14px;
            background: rgba(255,255,255,0.5);
            display: inline-block;
        }

        #loading {
            position: fixed;
            inset: 0;
            top: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            color: rgba(255,255,255,0.5);
            font-family: Menlo, Monaco, monospace;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
        }

        #stats-bar {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.3rem 1.2rem;
            color: rgba(255,255,255,0.55);
            font-family: Menlo, Monaco, monospace;
            font-size: 0.7rem;
            white-space: nowrap;
            display: none;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/members">Members</a>
        <a href="/gallery">Gallery</a>
        <a href="/storage">Storage</a>
        <a href="/archive">Public Archive</a>
        <a href="/status">Status</a>
        <a href="/map" target="_blank">Map</a>
        <a href="/boltmap">Bolt Map</a>
    </nav>

    <div id="loading">Loading bolt network data...</div>
    <div id="stats-bar"></div>
    <div id="map-container">
        <canvas id="canvas"></canvas>
    </div>

    <div id="tooltip"></div>

    <div id="hud">
        <div>Scroll: zoom &nbsp;|&nbsp; Drag: pan &nbsp;|&nbsp; Hover: inspect</div>
        <div id="coords">X: — &nbsp; Z: —</div>
    </div>

    <div id="legend">
        <div class="legend-row"><span class="legend-line"></span> Straight bolt</div>
        <div class="legend-row"><span class="legend-diag"></span> Diagonal bolt</div>
        <div class="legend-row"><span class="legend-vert"></span> Vertical section</div>
        <div class="legend-row"><span class="legend-dot"></span> Junction</div>
        <div class="legend-row"><span class="legend-square"></span> Station</div>
        <div class="legend-row" style="color:rgba(255,100,100,0.8)">✕ Hub (0,0 relative)</div>
    </div>

    <script>
    const CENTER_X = 264;
    const CENTER_Z = -162;
    const SCAN_RADIUS = 7500;

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('tooltip');
    const coordsEl = document.getElementById('coords');
    const statsBar = document.getElementById('stats-bar');
    const loadingEl = document.getElementById('loading');
    const container = document.getElementById('map-container');

    let data = null;

    // pan/zoom state
    let scale = 1;
    let offsetX = 0;
    let offsetY = 0;
    let dragging = false;
    let dragStartX = 0, dragStartY = 0;
    let dragOffsetX = 0, dragOffsetY = 0;

    function resize() {
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        if (data) draw();
    }

    // world → canvas
    function w2c(wx, wz) {
        const x_min = CENTER_X - SCAN_RADIUS;
        const z_min = CENTER_Z - SCAN_RADIUS;
        const span = SCAN_RADIUS * 2;
        const px = ((wx - x_min) / span) * canvas.width;
        const py = ((wz - z_min) / span) * canvas.height;
        return [px * scale + offsetX, py * scale + offsetY];
    }

    // canvas → world
    function c2w(cx, cy) {
        const x_min = CENTER_X - SCAN_RADIUS;
        const z_min = CENTER_Z - SCAN_RADIUS;
        const span = SCAN_RADIUS * 2;
        const px = (cx - offsetX) / scale;
        const py = (cy - offsetY) / scale;
        const wx = x_min + (px / canvas.width) * span;
        const wz = z_min + (py / canvas.height) * span;
        return [Math.round(wx), Math.round(wz)];
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (!data || !data.segments) return;

        const lineWidth = Math.max(0.5, 1.5 * scale);
        const dotR = Math.max(2, 5 * scale);
        const squareS = Math.max(2, 5 * scale);

        // segments
        for (const seg of data.segments) {
            const [sx, sy_] = w2c(seg.start.x, seg.start.z);
            const [ex, ey] = w2c(seg.end.x, seg.end.z);

            ctx.beginPath();
            ctx.moveTo(sx, sy_);
            ctx.lineTo(ex, ey);

            if (seg.type === 'diagonal') {
                ctx.strokeStyle = 'rgba(255,255,255,0.55)';
            } else if (seg.type === 'vertical') {
                ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                ctx.setLineDash([4 * scale, 3 * scale]);
            } else {
                ctx.strokeStyle = 'rgba(255,255,255,0.9)';
            }
            ctx.lineWidth = lineWidth;
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // turns (small dots)
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        for (const t of (data.turns || [])) {
            const [px, py] = w2c(t.x, t.z);
            ctx.beginPath();
            ctx.arc(px, py, Math.max(1, 2 * scale), 0, Math.PI * 2);
            ctx.fill();
        }

        // junctions (white filled circles)
        ctx.fillStyle = 'white';
        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
        ctx.lineWidth = 1;
        for (const j of (data.junctions || [])) {
            const [px, py] = w2c(j.x, j.z);
            ctx.beginPath();
            ctx.arc(px, py, dotR, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
        }

        // stations (white squares)
        ctx.fillStyle = 'white';
        for (const s of (data.stations || [])) {
            const [px, py] = w2c(s.x, s.z);
            ctx.fillRect(px - squareS, py - squareS, squareS * 2, squareS * 2);
            ctx.strokeRect(px - squareS, py - squareS, squareS * 2, squareS * 2);
        }

        // center cross (hub)
        const [hx, hy] = w2c(CENTER_X, CENTER_Z);
        const arm = 10 * scale;
        ctx.strokeStyle = 'rgba(255,80,80,0.9)';
        ctx.lineWidth = Math.max(1, 2 * scale);
        ctx.beginPath();
        ctx.moveTo(hx - arm, hy); ctx.lineTo(hx + arm, hy);
        ctx.moveTo(hx, hy - arm); ctx.lineTo(hx, hy + arm);
        ctx.stroke();
    }

    // ── Tooltip hit testing ──────────────────────────────────────────────────
    function hitTest(mouseX, mouseY) {
        if (!data) return null;
        const HIT_R = 12 / scale;

        const [wx, wz] = c2w(mouseX, mouseY);

        // check junctions
        for (const j of (data.junctions || [])) {
            const [px, py] = w2c(j.x, j.z);
            const dx = mouseX - px, dy = mouseY - py;
            if (Math.sqrt(dx*dx + dy*dy) < 10) {
                return { type: 'junction', data: j };
            }
        }

        // check stations
        for (const s of (data.stations || [])) {
            const [px, py] = w2c(s.x, s.z);
            const dx = mouseX - px, dy = mouseY - py;
            if (Math.sqrt(dx*dx + dy*dy) < 10) {
                return { type: 'station', data: s };
            }
        }

        // check segment proximity (point-to-line distance)
        for (const seg of (data.segments || [])) {
            const [sx, sy] = w2c(seg.start.x, seg.start.z);
            const [ex, ey] = w2c(seg.end.x, seg.end.z);
            const dist = pointToSegmentDist(mouseX, mouseY, sx, sy, ex, ey);
            if (dist < 6) {
                return { type: 'segment', data: seg };
            }
        }

        return null;
    }

    function pointToSegmentDist(px, py, ax, ay, bx, by) {
        const dx = bx - ax, dy = by - ay;
        const lenSq = dx*dx + dy*dy;
        if (lenSq === 0) return Math.sqrt((px-ax)**2 + (py-ay)**2);
        let t = ((px-ax)*dx + (py-ay)*dy) / lenSq;
        t = Math.max(0, Math.min(1, t));
        const nx = ax + t*dx, ny = ay + t*dy;
        return Math.sqrt((px-nx)**2 + (py-ny)**2);
    }

    function showTooltip(e, hit) {
        if (!hit) {
            tooltip.style.display = 'none';
            return;
        }
        let html = '';
        if (hit.type === 'segment') {
            const s = hit.data;
            html = `
                <strong>${s.type.toUpperCase()} BOLT</strong><br>
                Direction: ${s.direction}<br>
                Length: ${s.length} blocks<br>
                Start: ${s.start.x}, ${s.start.y}, ${s.start.z}<br>
                End: ${s.end.x}, ${s.end.y}, ${s.end.z}
            `;
        } else if (hit.type === 'junction') {
            const j = hit.data;
            html = `
                <strong>JUNCTION</strong><br>
                Connections: ${j.connections}<br>
                X: ${j.x} &nbsp; Y: ${j.y} &nbsp; Z: ${j.z}
            `;
        } else if (hit.type === 'station') {
            const s = hit.data;
            html = `
                <strong>STATION</strong><br>
                X: ${s.x} &nbsp; Y: ${s.y} &nbsp; Z: ${s.z}
            `;
        }
        tooltip.innerHTML = html;
        tooltip.style.display = 'block';
        let tx = e.clientX + 14;
        let ty = e.clientY + 14;
        if (tx + 260 > window.innerWidth) tx = e.clientX - 260 - 14;
        if (ty + 120 > window.innerHeight) ty = e.clientY - 120;
        tooltip.style.left = tx + 'px';
        tooltip.style.top = ty + 'px';
    }

    // ── Events ───────────────────────────────────────────────────────────────
    container.addEventListener('mousedown', e => {
        dragging = true;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        dragOffsetX = offsetX;
        dragOffsetY = offsetY;
    });

    window.addEventListener('mouseup', () => { dragging = false; });

    window.addEventListener('mousemove', e => {
        if (dragging) {
            offsetX = dragOffsetX + (e.clientX - dragStartX);
            offsetY = dragOffsetY + (e.clientY - dragStartY);
            draw();
            tooltip.style.display = 'none';
        } else {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            const [wx, wz] = c2w(mx, my);
            coordsEl.textContent = `X: ${wx}  Z: ${wz}`;
            const hit = hitTest(mx, my);
            showTooltip(e, hit);
            container.style.cursor = hit ? 'pointer' : (dragging ? 'grabbing' : 'grab');
        }
    });

    container.addEventListener('wheel', e => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        const zoomFactor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
        const newScale = Math.max(0.1, Math.min(50, scale * zoomFactor));

        // zoom toward mouse position
        offsetX = mx - (mx - offsetX) * (newScale / scale);
        offsetY = my - (my - offsetY) * (newScale / scale);
        scale = newScale;
        draw();
    }, { passive: false });

    // touch support
    let lastTouchDist = 0;
    container.addEventListener('touchstart', e => {
        if (e.touches.length === 1) {
            dragging = true;
            dragStartX = e.touches[0].clientX;
            dragStartY = e.touches[0].clientY;
            dragOffsetX = offsetX;
            dragOffsetY = offsetY;
        } else if (e.touches.length === 2) {
            dragging = false;
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            lastTouchDist = Math.sqrt(dx*dx + dy*dy);
        }
    });

    container.addEventListener('touchmove', e => {
        e.preventDefault();
        if (e.touches.length === 1 && dragging) {
            offsetX = dragOffsetX + (e.touches[0].clientX - dragStartX);
            offsetY = dragOffsetY + (e.touches[0].clientY - dragStartY);
            draw();
        } else if (e.touches.length === 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const zf = dist / lastTouchDist;
            scale = Math.max(0.1, Math.min(50, scale * zf));
            lastTouchDist = dist;
            draw();
        }
    }, { passive: false });

    container.addEventListener('touchend', () => { dragging = false; });

    // ── Load data ─────────────────────────────────────────────────────────────
    function updateStats(d) {
        if (!d.stats && !d.segments) return;
        const segs = d.segments ? d.segments.length : 0;
        const juns = d.junctions ? d.junctions.length : 0;
        const stas = d.stations ? d.stations.length : 0;
        const len  = d.total_length || 0;
        statsBar.textContent = `Segments: ${segs}  |  Junctions: ${juns}  |  Stations: ${stas}  |  Total length: ${len} blocks`;
        statsBar.style.display = 'block';
    }

    function loadData() {
        fetch('/data/boltmap.json?t=' + Date.now())
            .then(r => r.json())
            .then(d => {
                data = d;
                loadingEl.style.display = 'none';
                updateStats(d);

                if (!d.progress || !d.progress.complete) {
                    // still scanning — reload in 5s
                    loadingEl.style.display = 'flex';
                    loadingEl.textContent = `Scanning... (${d.progress ? d.progress.scanned : 0} regions done, ${d.rail_blocks_found || 0} rail blocks found)`;
                    setTimeout(loadData, 5000);
                } else {
                    loadingEl.style.display = 'none';
                }

                draw();
            })
            .catch(() => {
                loadingEl.textContent = 'No bolt map data found. Run scan.py to generate.';
            });
    }

    window.addEventListener('resize', resize);
    resize();
    loadData();
    </script>
</body>
</html>
