<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fork-awesome@1.1.7/css/fork-awesome.min.css" integrity="sha256-gsmEoJAws/Kd3CjuOQzLie5Q3yshhvmo7YNtBG7aaEY=" crossorigin="anonymous">

    <style>
      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        padding: 1rem 2rem;
        display: flex;
        gap: 2rem;
        z-index: 100;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        background: rgba(0,0,0,0.25);
      }
      nav a {
        color: rgba(255,255,255,0.75);
        text-decoration: none;
        font-size: 1rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        transition: color 0.2s;
      }
      nav a:hover {
        color: white;
      }
      .subtext {
        font-size: 2.2rem;
        color: rgba(255,255,255,0.65);
        margin-bottom: 1.5rem;
      }
      #contents {
        padding-top: 5px;
      }

  <body>
    <nav>
      <a href="/">Home</a>

      <a href="/storage">Storage</a>

    <div id="contents">
      <h1 class="font-weight-light animate__animated animate__fadeInUp" style="animation-delay: 0.2s; font-size: 3.5rem;">Chronos Technical Minecraft</h1>

      <p class="lead">
        <a target="_blank" href="https://github.com/ChronosServer" style="animation-delay: 0.5s" class="btn btn-lg btn-outline-light animate__animated animate__fadeInUp fa fa-github"></a>

        <a target="_blank" href="https://www.patreon.com/cw/Chronos_SMP" style="animation-delay: 0.5s" class="btn btn-lg btn-outline-light animate__animated animate__fadeInUp fa fa-patreon"></a>
      </p>
    </div>

    <script src="js/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
