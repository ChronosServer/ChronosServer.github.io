---
layout: null
permalink: /archive/
---
<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fork-awesome@1.1.7/css/fork-awesome.min.css">
    <link rel="stylesheet" href="/css/site.css">
    <title>Public Archive — Chronos</title>
    <style>
        .tag-bar { display:flex; flex-wrap:wrap; gap:.5rem; margin-bottom:1.5rem; }
        .tag-btn {
            background:none; border:1px solid rgba(255,255,255,0.2);
            color:rgba(255,255,255,0.5); padding:.25rem .75rem; cursor:pointer;
            font-family:inherit; font-size:.75rem; letter-spacing:.08em;
            text-transform:uppercase; transition:all .15s;
        }
        .tag-btn.active, .tag-btn:hover { border-color:white; color:white; }

        .posts-grid {
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
            gap:1rem;
        }
        .post-card {
            background:rgba(0,0,0,0.7); border:1px solid rgba(255,255,255,0.1);
            cursor:pointer; transition:border-color .15s, background .15s; overflow:hidden;
        }
        .post-card:hover { border-color:rgba(255,255,255,0.3); background:rgba(0,0,0,0.85); }
        .post-thumb { width:100%; height:150px; object-fit:cover; display:block; filter:brightness(.85); }
        .post-thumb-placeholder { width:100%; height:150px; background:rgba(255,255,255,0.03); }
        .post-body { padding:.75rem; }
        .post-author { display:flex; align-items:center; gap:.5rem; margin-bottom:.4rem; }
        .post-author img { width:20px; height:20px; border-radius:50%; }
        .post-author-name { font-size:.7rem; color:rgba(255,255,255,0.45); }
        .post-title { font-size:.9rem; color:white; margin-bottom:.4rem; line-height:1.3; }
        .post-tags { display:flex; flex-wrap:wrap; gap:.3rem; }
        .post-tag {
            font-size:.6rem; letter-spacing:.08em; text-transform:uppercase;
            color:rgba(255,255,255,0.4); border:1px solid rgba(255,255,255,0.15);
            padding:.1rem .4rem;
        }

        /* pagination */
        .pagination { display:flex; gap:.5rem; margin-top:2rem; flex-wrap:wrap; }
        .page-btn {
            background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.15);
            color:rgba(255,255,255,0.5); padding:.3rem .75rem; cursor:pointer;
            font-family:inherit; font-size:.8rem; transition:all .15s;
        }
        .page-btn.active, .page-btn:hover { border-color:white; color:white; }

        /* modal */
        .modal-overlay {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,0,0.92); z-index:1000; overflow-y:auto; padding:2rem 1rem;
        }
        .modal-overlay.active { display:block; }
        .modal-box {
            max-width:800px; margin:0 auto;
            background:rgba(8,8,8,0.98); border:1px solid rgba(255,255,255,0.12);
            padding:2rem; color:white; position:relative;
        }
        .modal-close {
            position:absolute; top:1rem; right:1.5rem;
            background:none; border:none; color:rgba(255,255,255,0.6);
            font-size:1.5rem; cursor:pointer; line-height:1;
        }
        .modal-close:hover { color:white; }
        .modal-title { font-size:1.3rem; margin-bottom:.3rem; }
        .modal-meta { font-size:.75rem; color:rgba(255,255,255,0.35); margin-bottom:1.2rem; display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; }
        .modal-meta img { width:22px; height:22px; border-radius:50%; }
        .modal-body { font-size:.88rem; line-height:1.75; color:rgba(255,255,255,0.8); white-space:pre-wrap; word-break:break-word; }
        .modal-img { max-width:100%; margin:.75rem 0; display:block; border:1px solid rgba(255,255,255,0.08); }

        /* embed card */
        .embed-card {
            border-left:3px solid rgba(255,255,255,0.2);
            background:rgba(255,255,255,0.04);
            padding:.75rem 1rem; margin:.75rem 0;
            display:flex; gap:1rem; align-items:flex-start;
        }
        .embed-card-text { flex:1; min-width:0; }
        .embed-card-title { font-size:.88rem; color:rgba(100,180,255,0.9); margin-bottom:.25rem; text-decoration:none; }
        .embed-card-title:hover { text-decoration:underline; color:rgba(140,200,255,1); }
        .embed-card-desc { font-size:.78rem; color:rgba(255,255,255,0.5); line-height:1.5; overflow:hidden; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; }
        .embed-card-thumb { width:80px; height:60px; object-fit:cover; flex-shrink:0; }

        /* download links */
        .downloads { margin:.75rem 0; display:flex; flex-wrap:wrap; gap:.4rem; }
        .dl-btn {
            display:inline-flex; align-items:center; gap:.35rem;
            background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15);
            color:rgba(255,255,255,0.7); padding:.3rem .65rem;
            font-size:.75rem; text-decoration:none; font-family:inherit;
            transition:all .15s;
        }
        .dl-btn:hover { background:rgba(255,255,255,0.12); color:white; border-color:rgba(255,255,255,0.3); }
        .dl-btn .fa { font-size:.7rem; }

        /* reply */
        .reply { border-top:1px solid rgba(255,255,255,0.07); margin-top:1.25rem; padding-top:1.25rem; }
        .reply-author { display:flex; align-items:center; gap:.5rem; margin-bottom:.4rem; }
        .reply-author img { width:20px; height:20px; border-radius:50%; }
        .reply-author-name { font-size:.75rem; color:rgba(255,255,255,0.4); }
        .reply-body { font-size:.83rem; color:rgba(255,255,255,0.75); white-space:pre-wrap; line-height:1.65; word-break:break-word; }

        /* loading */
        .loading { text-align:center; padding:4rem; color:rgba(255,255,255,0.3); font-size:.9rem; letter-spacing:.1em; }
        .loading-dot { animation:blink 1.2s infinite; }
        .loading-dot:nth-child(2) { animation-delay:.2s; }
        .loading-dot:nth-child(3) { animation-delay:.4s; }
        @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
    </style>
</head>
<body>
<nav>
    <a href="/">Home</a>
    <a href="/members">Members</a>
    <a href="/gallery">Gallery</a>
    <a href="/storage">Storage</a>
    <a href="/archive">Public Archive</a>
    <a href="/status">Status</a>
    <a href="/map" target="_blank">Map</a>
</nav>

<div class="page-wrapper">
    <div class="page-title">Public Archive</div>
    <input class="search-bar" id="search" placeholder="Search posts..." oninput="onSearch()">
    <div class="tag-bar" id="tag-bar"></div>
    <div id="loading" class="loading">Loading<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span></div>
    <div class="posts-grid" id="posts-grid" style="display:none"></div>
    <div class="pagination" id="pagination"></div>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal-box">
        <button class="modal-close" id="modal-close">&times;</button>
        <div id="modal-content"></div>
    </div>
</div>

<script>
const PAGE_SIZE = 18;
let allPosts = [];
let filtered = [];
let activeTag = null;
let currentPage = 0;

function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'});
}

function isImage(url) {
    return /\.(png|jpg|jpeg|webp|gif)(\?|$)/i.test(url);
}

function fileName(url) {
    try { return decodeURIComponent(url.split('/').pop().split('?')[0]); }
    catch { return 'Download'; }
}

function getThumb(post) {
    for (const a of (post.attachments || [])) { if (isImage(a)) return a; }
    for (const e of (post.embeds || [])) { if (e.thumbnail) return e.thumbnail; if (e.image) return e.image; }
    return null;
}

function renderDownloads(attachments) {
    const files = (attachments || []).filter(a => !isImage(a));
    if (!files.length) return '';
    return '<div class="downloads">' + files.map(url =>
        `<a class="dl-btn" href="${url}" target="_blank" download><i class="fa fa-download"></i>${fileName(url)}</a>`
    ).join('') + '</div>';
}

function renderImages(attachments) {
    return (attachments || []).filter(isImage).map(url =>
        `<img class="modal-img" src="${url}" loading="lazy" onerror="this.style.display='none'">`
    ).join('');
}

function renderEmbeds(embeds) {
    return (embeds || []).filter(e => e.title || e.url || e.thumbnail).map(e => {
        const thumb = e.thumbnail ? `<img class="embed-card-thumb" src="${e.thumbnail}" onerror="this.style.display='none'">` : '';
        const title = e.title
            ? `<a class="embed-card-title" href="${e.url || '#'}" target="_blank">${e.title}</a>`
            : (e.url ? `<a class="embed-card-title" href="${e.url}" target="_blank">${e.url}</a>` : '');
        const desc = e.description ? `<div class="embed-card-desc">${e.description}</div>` : '';
        return `<div class="embed-card"><div class="embed-card-text">${title}${desc}</div>${thumb}</div>`;
    }).join('');
}

const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            const img = entry.target;
            if (img.dataset.src) {
                img.src = img.dataset.src;
                img.removeAttribute('data-src');
                observer.unobserve(img);
            }
        }
    });
}, { rootMargin: '200px' });

function renderPost(post) {
    const thumb = getThumb(post);
    const card = document.createElement('div');
    card.className = 'post-card';

    let thumbHtml = '<div class="post-thumb-placeholder"></div>';
    if (thumb) {
        const img = document.createElement('img');
        img.className = 'post-thumb';
        img.dataset.src = thumb;
        img.onerror = function() { this.style.display='none'; };
        // placeholder until observed
        thumbHtml = '';
        card.innerHTML = `
            <div class="post-body">
                <div class="post-author">
                    <img src="${post.author_avatar}" onerror="this.style.display='none'">
                    <span class="post-author-name">${post.author} · ${formatDate(post.timestamp)}</span>
                </div>
                <div class="post-title">${post.title}</div>
                <div class="post-tags">${(post.tags||[]).map(t=>`<span class="post-tag">${t}</span>`).join('')}</div>
            </div>`;
        card.prepend(img);
        observer.observe(img);
        card.onclick = () => openPost(post);
        return card;
    }

    card.innerHTML = `
        ${thumbHtml}
        <div class="post-body">
            <div class="post-author">
                <img src="${post.author_avatar}" onerror="this.style.display='none'">
                <span class="post-author-name">${post.author} · ${formatDate(post.timestamp)}</span>
            </div>
            <div class="post-title">${post.title}</div>
            <div class="post-tags">${(post.tags||[]).map(t=>`<span class="post-tag">${t}</span>`).join('')}</div>
        </div>`;
    card.onclick = () => openPost(post);
    return card;
}

function renderPage() {
    const grid = document.getElementById('posts-grid');
    grid.innerHTML = '';
    const start = currentPage * PAGE_SIZE;
    const slice = filtered.slice(start, start + PAGE_SIZE);
    slice.forEach(p => grid.appendChild(renderPost(p)));
    renderPagination();
}

function renderPagination() {
    const total = Math.ceil(filtered.length / PAGE_SIZE);
    const pg = document.getElementById('pagination');
    pg.innerHTML = '';
    if (total <= 1) return;
    for (let i = 0; i < total; i++) {
        const btn = document.createElement('button');
        btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
        btn.textContent = i + 1;
        btn.onclick = () => { currentPage = i; renderPage(); window.scrollTo(0,0); };
        pg.appendChild(btn);
    }
}

function applyFilter() {
    const q = document.getElementById('search').value.toLowerCase();
    filtered = allPosts.filter(p => {
        if (activeTag && !p.tags.includes(activeTag)) return false;
        if (q && !p.title.toLowerCase().includes(q) && !p.content.toLowerCase().includes(q)) return false;
        return true;
    });
    currentPage = 0;
    renderPage();
}

function onSearch() { applyFilter(); }

function openPost(post) {
    const c = document.getElementById('modal-content');
    let html = `
        <div class="modal-title">${post.title}</div>
        <div class="modal-meta">
            <img src="${post.author_avatar}" onerror="this.style.display='none'">
            <span>${post.author} · ${formatDate(post.timestamp)}</span>
            ${(post.tags||[]).map(t=>`<span class="post-tag">${t}</span>`).join('')}
        </div>
        <div class="modal-body">${post.content}</div>
        ${renderImages(post.attachments)}
        ${renderDownloads(post.attachments)}
        ${renderEmbeds(post.embeds)}`;

    for (const msg of (post.messages || [])) {
        if (!msg.content && !msg.attachments?.length && !msg.embeds?.length) continue;
        html += `
        <div class="reply">
            <div class="reply-author">
                <img src="${msg.author_avatar}" onerror="this.style.display='none'">
                <span class="reply-author-name">${msg.author} · ${formatDate(msg.timestamp)}</span>
            </div>
            ${msg.content ? `<div class="reply-body">${msg.content}</div>` : ''}
            ${renderImages(msg.attachments)}
            ${renderDownloads(msg.attachments)}
            ${renderEmbeds(msg.embeds)}
        </div>`;
    }

    c.innerHTML = html;
    document.getElementById('modal').classList.add('active');
}

document.getElementById('modal-close').onclick = () => document.getElementById('modal').classList.remove('active');
document.getElementById('modal').onclick = e => { if (e.target === document.getElementById('modal')) document.getElementById('modal').classList.remove('active'); };
document.onkeydown = e => { if (e.key === 'Escape') document.getElementById('modal').classList.remove('active'); };

fetch('/data/archive.json')
    .then(r => r.json())
    .then(data => {
        allPosts = data;
        filtered = data;

        const tags = [...new Set(data.flatMap(p => p.tags||[]))].sort();
        const bar = document.getElementById('tag-bar');

        const allBtn = document.createElement('button');
        allBtn.className = 'tag-btn active';
        allBtn.textContent = 'All';
        allBtn.onclick = () => {
            activeTag = null;
            bar.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
            allBtn.classList.add('active');
            applyFilter();
        };
        bar.appendChild(allBtn);

        tags.forEach(tag => {
            const btn = document.createElement('button');
            btn.className = 'tag-btn';
            btn.textContent = tag;
            btn.onclick = () => {
                activeTag = tag;
                bar.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                applyFilter();
            };
            bar.appendChild(btn);
        });

        document.getElementById('loading').style.display = 'none';
        document.getElementById('posts-grid').style.display = 'grid';
        renderPage();
    })
    .catch(() => {
        document.getElementById('loading').textContent = 'Failed to load archive data.';
    });
</script>
</body>
</html>
